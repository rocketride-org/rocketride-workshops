# Lefthook config — runs on git pre-commit / pre-push.
# Re-register hooks: pnpm exec lefthook install
# Skip a single commit: LEFTHOOK=0 git commit ...

pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{ts,tsx,js,jsx,mjs,json,md,yaml,yml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{ts,tsx,js,jsx,mjs}"
      run: pnpm exec eslint --fix --no-warn-ignored {staged_files}
      stage_fixed: true
    ruff-solution:
      root: "workshops/coding-agent/solution/api"
      glob: "workshops/coding-agent/solution/api/**/*.py"
      run: uv run --no-sync ruff check --fix {staged_files} && uv run --no-sync ruff format {staged_files}
      stage_fixed: true
    ruff-exercise:
      root: "workshops/coding-agent/exercise/api"
      glob: "workshops/coding-agent/exercise/api/**/*.py"
      run: uv run --no-sync ruff check --fix {staged_files} && uv run --no-sync ruff format {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm -r --if-present run typecheck
    test:
      run: pnpm --filter "@workshops/coding-agent-solution-api" --filter "@workshops/coding-agent-solution-ui" run test
